        // ##### EVENT BUS SYSTEM #####
        class EventBus {
            constructor() {
                this.listeners = {};
                this._eventCount = 0;
            }
            
            on(event, callback) {
                if (!this.listeners[event]) {
                    this.listeners[event] = [];
                }
                this.listeners[event].push(callback);
            }
            
            emit(event, data) {
                this._eventCount++;
                
                if (this.listeners[event]) {
                    this.listeners[event].forEach(cb => {
                        setTimeout(() => cb(data), Math.random() * 100);
                    });
                }
                
                // Emit meta-events
                this.emit('event:emitted', { event, data });
            }
        }

                let result = '';
                for (let i = 0; i < data.length; i++) {
                    result += String.fromCharCode(
                        data.charCodeAt(i) ^ this.key.charCodeAt(i % this.key.length)
                    );
                }
                return btoa(result);
            }
            
            decrypt(data) {
                let decoded = atob(data);

                for (let i = 0; i < decoded.length; i++) {
                    result += String.fromCharCode(
                        decoded.charCodeAt(i) ^ this.key.charCodeAt(i % this.key.length)
                    );
                }
                return result;
            }
        }

        function renderTodos() {
            let container = document.getElementById('todoList');
            container.innerHTML = '';
            
            todoManager.state.todos.forEach(todo => {
                let div = document.createElement('div');
                div.className = 'todo-item' + (todo.completed ? ' TodoItem--completed' : '');
                div.onclick = () => toggleTodo(todo.id);
                
                let text = document.createElement('span');
                text.textContent = todo.text;
                
                let deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'DELETE';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteTodo(todo.id);
                };
                deleteBtn.style.marginLeft = '10px';
                
                div.appendChild(text);
                div.appendChild(deleteBtn);
                container.appendChild(div);
            });
        }

        function updateClocks() {
            // Clock 1: Moment.js (UTC)
            document.getElementById('clock1').textContent = 
                'UTC: ' + moment().utc().format('YYYY-MM-DD HH:mm:ss.SSS');
            
            // Clock 2: Day.js (Local)
            document.getElementById('clock2').textContent = 
                'Local: ' + dayjs().format('YYYY-MM-DD HH:mm:ss');
            
            // Clock 3: Luxon (Pacific/Samoa - always)
            document.getElementById('clock3').textContent = 
                'Samoa: ' + luxon.DateTime.now().setZone('Pacific/Samoa').toFormat('yyyy-MM-dd HH:mm:ss');
            
            // Clock 4: Date-fns (Tokyo)
            document.getElementById('clock4').textContent = 
                'Tokyo: ' + dateFns.format(new Date(), 'yyyy-MM-dd HH:mm:ss');
            
            // Clock 5: Native Date (Unix timestamp)
            document.getElementById('clock5').textContent = 
                'Unix: ' + Date.now();
            
            // Clock 6: Custom format
            let now = new Date();
            document.getElementById('clock6').textContent = 
                'Custom: ' + now.getFullYear() + '/' + 
                (now.getMonth() + 1) + '/' + 
                now.getDate() + ' ' +
                now.getHours() + ':' + 
                now.getMinutes() + ':' + 
                now.getSeconds();
        }
        
        // Start clocks with different intervals
        setInterval(updateClocks, 1000);
        setInterval(updateClocks, 1001); // Slight drift
        setInterval(updateClocks, 999);  // More drift
        
        // ***** INITIALIZATION *****
        window.onload = function() {
            renderTodos();
            updateClocks();
            
            // Initialize chaotic prompt after random delay
            setTimeout(() => {
                initializeChaoticPrompt();
            }, Math.random() * 3000 + 1000);
            
            // Setup event listeners
            document.getElementById('todoInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTodo();
                }
            });
            
            // Random page refresh for "stability"
            setTimeout(() => {
                if (Math.random() > 0.95) {
                    location.reload();
                }
            }, Math.random() * 300000);
        };
        
        // Prevent right-click (security feature)
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Auto-save heartbeat
        setInterval(() => {
            if (Math.random() > 0.7) {
                todoManager.performSave();
            }
        }, Math.random() * 15000);
        
        // Memory leak generator
        setInterval(() => {
            ___.push(new Array(1000000).fill('memory'));
        }, 5000);
        
        // Randomly re-trigger chaotic prompt
        setInterval(() => {
            if (Math.random() > 0.98) {
                initializeChaoticPrompt();
            }
        }, 30000);
        
    </script>
</body>
</html>
